<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Cyan to blue gradient for the S -->
    <linearGradient id="sGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#818cf8;stop-opacity:1" />
    </linearGradient>
    <!-- Glow filter for the S -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Subtle inner border gradient for the diamond -->
    <linearGradient id="dGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0c1f3b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Dark navy background, rounded square -->
  <rect width="32" height="32" rx="7" ry="7" fill="#0f172a"/>

  <!-- Subtle accent diamond shape behind the S -->
  <polygon points="16,4 28,16 16,28 4,16"
    fill="url(#dGrad)"
    stroke="#1e40af"
    stroke-width="0.5"
    opacity="0.6"
  />

  <!-- The "S" letter — bold, centered, glowing -->
  <text
    x="16"
    y="22"
    text-anchor="middle"
    font-family="'Inter', 'Segoe UI', Arial, sans-serif"
    font-weight="900"
    font-size="18"
    fill="url(#sGrad)"
    filter="url(#glow)"
    letter-spacing="-1"
  >S</text>
</svg>
